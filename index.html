    <style>
      .index_loadingContainer {
        display: flex;
        align-items: center;
        width: 100%;
        height: 100%;
        background: #f6f6f6;
        position: fixed;
        left: 0;
        top: 0;
      }
      .index_loadingContainer .loading {
        display: flex;
        align-items: center;
        width: 100%;
        justify-content: center;
      }

      .index_loadingContainer .loading>div {
        width: 12px;
        height: 12px;
        border-radius: 100%;
        display: inline-block;
        background-color: #000;
        animation: three 1.4s infinite ease-in-out;
        animation-fill-mode: both;
        margin-right: 6px;
      }

      .index_loadingContainer .loading .three1 {
        animation-delay: -0.3s
      }

      .index_loadingContainer .loading .three2 {
        animation-delay: -0.15s
      }

      @keyframes three {
        0%,80%,to {
          transform: scale(0)
        }
        40% {
          transform: scale(1)
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="index_loadingContainer">
        <div class="loading">
          <div class="three1"></div>
          <div class="three2"></div>
          <div class="three3"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script src="<%= cdnPath %>/resource/js/icons.js"></script>
  </body>
</html>
